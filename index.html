<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Career Prediction System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card shadow-lg p-4">

        <h1 class="text-center text-primary mb-4">
            Career Prediction System
        </h1>

        <form action="/predict" method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Physics Marks</label>
                    <input type="number" class="form-control" name="Physics" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Chemistry Marks</label>
                    <input type="number" class="form-control" name="Chemistry" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Mathematics Marks</label>
                    <input type="number" class="form-control" name="Mathematics" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Biology Marks</label>
                    <input type="number" class="form-control" name="Biology" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">English Marks</label>
                    <input type="number" class="form-control" name="English" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Computer Science Marks</label>
                    <input type="number" class="form-control" name="Computer_Science" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Economics Marks</label>
                    <input type="number" class="form-control" name="Economics" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Accountancy Marks</label>
                    <input type="number" class="form-control" name="Accountancy" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Business Studies Marks</label>
                    <input type="number" class="form-control" name="Business_Studies" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">History Marks</label>
                    <input type="number" class="form-control" name="History" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Geography Marks</label>
                    <input type="number" class="form-control" name="Geography" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Political Science Marks</label>
                    <input type="number" class="form-control" name="Political_Science" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Stream</label>

                    <select class="form-select" name="Stream" required>
                        <option value="">Select Stream</option>
                        <option value="Science">Science</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Arts">Arts</option>
                    </select>

                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Aggregate Percentage</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="Aggregate_Percentage"
                           required>
                </div>

            </div>

            <div class="d-grid mt-3">

                <button class="btn btn-primary btn-lg" type="submit">

                    Predict Career

                </button>

            </div>

        </form>

        {% if prediction %}

        <div class="alert alert-success mt-4 text-center">

            <h3>🎯 Predicted Career</h3>

            <h2>{{ prediction }}</h2>

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
